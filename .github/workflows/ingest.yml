name: Monthly Ingest
on:
  schedule:
    - cron: '0 3 1 * *'
  workflow_dispatch:
    inputs:
      force:
        description: Force rebuild even if no changes detected
        type: boolean
        default: false
jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run ingest:full
      - run: npm run coverage:verify
        if: ${{ !inputs.force }}
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data: monthly ingest update"
          file_pattern: "data/ COVERAGE.md"
